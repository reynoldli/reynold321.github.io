---
layout: default
---

<article class="post">
    <header class="post-header">
        <h1>{{ page.title }}</h1>
        <p class="post-meta">
            {{ page.date | date: "%Y年%m月%d日" }}
            {% if page.categories %}
                | 分类: {{ page.categories | join: ", " }}
            {% endif %}
        </p>
    </header>
    
    <div class="post-content">
        {{ content }}
    </div>
    
    <nav class="post-nav">
        {% if page.previous %}
            <a href="{{ page.previous.url }}" class="prev">← {{ page.previous.title }}</a>
        {% endif %}
        {% if page.next %}
            <a href="{{ page.next.url }}" class="next">{{ page.next.title }} →</a>
        {% endif %}
    </nav>
</article>
